log4j.rootLogger=INFO,CONSOLE,FILE

log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender
log4j.appender.CONSOLE.layout=cn.codethink.xiaoming.platform.logger.ColorfulPatternLayout

log4j.appender.FILE=org.apache.log4j.FileAppender
log4j.appender.FILE.file=${xiaoming.platform.debug.log}
log4j.appender.FILE.encoding=UTF-8
log4j.appender.FILE.append=false
log4j.appender.FILE.layout=org.apache.log4j.PatternLayout
log4j.appender.FILE.layout.ConversionPattern=[%d{yyyy-MM-dd HH:mm:ss}] [%t] %c | %p : %m%n